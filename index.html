<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JVL ERP - บริหารจัดการพลังงาน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; }
        .nav-sidebar { background: #212529; min-height: 100vh; color: white; }
        .nav-sidebar a { color: #adb5bd; text-decoration: none; padding: 15px; display: block; }
        .nav-sidebar a.active { background: #0d6efd; color: white; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075); }
        #login-page { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-page">
    <div class="card p-4 shadow-lg" style="width: 350px;">
        <h4 class="text-center mb-4">JVL ERP Login</h4>
        <input type="text" id="user" class="form-control mb-3" placeholder="ชื่อผู้ใช้งาน">
        <input type="password" id="pass" class="form-control mb-3" placeholder="รหัสผ่าน">
        <button onclick="login()" class="btn btn-primary w-100">เข้าสู่ระบบ</button>
    </div>
</div>

<div id="main-app" style="display:none;" class="container-fluid">
    <div class="row">
        <div class="col-md-2 p-0 nav-sidebar d-none d-md-block">
            <div class="p-3 text-center"><h5>ระบบบริหารส่วนกลาง</h5></div>
            <a href="#" onclick="switchTab('input')" id="tab-input" class="active"><i class="fas fa-edit me-2"></i> บันทึกข้อมูล</a>
            <a href="#" onclick="switchTab('report')" id="tab-report"><i class="fas fa-chart-bar me-2"></i> รายงาน/แก้ไขข้อมูล</a>
            <a href="#" onclick="location.reload()" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> ออกจากระบบ</a>
        </div>
        
        <div class="col-md-10 p-4">
            <div id="view-input">
                <h3 class="mb-4">บันทึกข้อมูลประจำเดือน</h3>
                <div class="row">
                    <div class="col-md-7">
                        <div class="card p-4 mb-4">
                            <h5><i class="fas fa-bolt text-warning me-2"></i> บันทึกค่าไฟฟ้า (แยกโซน)</h5>
                            <form id="elecForm" onsubmit="saveElec(event)">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label>ประจำเดือน</label>
                                        <select name="month" class="form-select" required></select>
                                    </div>
                                    <div class="col-md-6">
                                        <label>ปี พ.ศ.</label>
                                        <select name="year" class="form-select" required></select>
                                    </div>
                                </div>
                                <div class="row border-top pt-3">
                                    <div class="col-md-6">
                                        <p class="fw-bold text-primary">โซนบ้านพัก</p>
                                        <input type="number" step="0.01" name="h_unit" class="form-control mb-2" placeholder="หน่วยที่ใช้" required>
                                        <input type="number" step="0.01" name="h_price" class="form-control" placeholder="ราคา (บาท)" required>
                                    </div>
                                    <div class="col-md-6 border-start">
                                        <p class="fw-bold text-success">โซนบริการ/สำนักงาน</p>
                                        <input type="number" step="0.01" name="s_unit" class="form-control mb-2" placeholder="หน่วยที่ใช้" required>
                                        <input type="number" step="0.01" name="s_price" class="form-control" placeholder="ราคา (บาท)" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-warning mt-3 w-100">บันทึกค่าไฟทั้งหมด</button>
                            </form>
                        </div>
                    </div>
                    <div class="col-md-5">
                        <div class="card p-4">
                            <h5><i class="fas fa-tint text-info me-2"></i> บันทึกค่าน้ำประปา (รวม)</h5>
                            <form id="waterForm" onsubmit="saveWater(event)">
                                <div class="mb-2">
                                    <label>เดือน/ปี</label>
                                    <div class="input-group">
                                        <select name="month" class="form-select" id="w_month"></select>
                                        <select name="year" class="form-select" id="w_year"></select>
                                    </div>
                                </div>
                                <div class="mb-2">
                                    <label>หน่วยรวมทั้ง รพ.</label>
                                    <input type="number" step="0.01" name="units" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label>ยอดเงินรวม (บาท)</label>
                                    <input type="number" step="0.01" name="price" class="form-control" required>
                                </div>
                                <button type="submit" class="btn btn-info text-white w-100">บันทึกค่าน้ำ</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-report" style="display:none;">
                <h3 class="mb-4">รายงานสรุปและจัดการข้อมูล</h3>
                <div class="mb-3 d-flex gap-2">
                    <button class="btn btn-outline-primary active" onclick="loadTable('Electricity_Logs')">ตารางค่าไฟ</button>
                    <button class="btn btn-outline-info" onclick="loadTable('Water_Logs')">ตารางค่าน้ำ</button>
                </div>
                <div class="card p-3">
                    <div class="table-responsive">
                        <table id="mainTable" class="table table-hover table-bordered w-100"></table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.print.min.js"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzY5ToEERO8PdRD2S1KvYWQDvs1fX78Hu4Myq1tzpvJNwbA1KMh2n66Tp4fBcp6F1EvQA/exec";
    let currentUser = "";

    // ตั้งค่าเริ่มต้น
    const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    const currentYear = new Date().getFullYear() + 543;

    function init() {
        $('select[name="month"]').html(months.map(m => `<option value="${m}">${m}</option>`).join(''));
        let yearOpts = "";
        for(let y=currentYear; y>=currentYear-5; y--) yearOpts += `<option value="${y}">${y}</option>`;
        $('select[name="year"]').html(yearOpts);
    }
    init();

    async function login() {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', username: $('#user').val(), password: $('#pass').val() }) });
        const data = await res.json();
        if(data.status === "success") {
            currentUser = data.userData.name;
            $('#login-page').hide();
            $('#main-app').show();
        } else alert(data.message);
    }

    function switchTab(tab) {
        $('.nav-sidebar a').removeClass('active');
        $(`#tab-${tab}`).addClass('active');
        if(tab === 'input') { $('#view-input').show(); $('#view-report').hide(); }
        else { $('#view-input').hide(); $('#view-report').show(); loadTable('Electricity_Logs'); }
    }

    async function saveElec(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const row = [new Date().toLocaleString('th-TH'), fd.get('month'), fd.get('year'), fd.get('h_unit'), fd.get('h_price'), fd.get('s_unit'), fd.get('s_price'), currentUser];
        await sendData('Electricity_Logs', row);
        e.target.reset();
    }

    async function saveWater(e) {
        e.preventDefault();
        const fd = new FormData(e.target);
        const row = [new Date().toLocaleString('th-TH'), fd.get('month'), fd.get('year'), fd.get('units'), fd.get('price'), currentUser];
        await sendData('Water_Logs', row);
        e.target.reset();
    }

    async function sendData(sheet, row) {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'saveData', targetSheet: sheet, rowData: row }) });
        alert("บันทึกสำเร็จ!");
    }

    async function loadTable(sheetName) {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'getData', targetSheet: sheetName }) });
        const json = await res.json();
        const data = json.data;
        const headers = data[0];
        const rows = data.slice(1);

        if ($.fn.DataTable.isDataTable('#mainTable')) $('#mainTable').DataTable().destroy();
        $('#mainTable').empty();

        $('#mainTable').DataTable({
            data: rows,
            columns: headers.map((h, i) => ({ title: h })),
            dom: 'Bfrtip',
            buttons: ['copy', 'excel', 'pdf', 'print'],
            language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json' }
        });
    }
</script>
</body>
</html>
